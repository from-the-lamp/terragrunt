extraArgs:
  - --code-challenge-method=S256
config:
  configFile: |-
    provider="gitlab"
    provider_display_name="istio"
    redirect_url="https://oauth2.from-the-lamp.com/oauth2/callback"
    login_url="https://oauth2.from-the-lamp.com/oauth/authorize"
    redeem_url="https://oauth2.from-the-lamp.com/oauth/token"
    oidc_jwks_url="https://oauth2.from-the-lamp.com/oauth/discovery/keys"
    validate_url="https://oauth2.from-the-lamp.com/api/v4/user"
    email_domains=[ "*" ]
    cookie_refresh=0
    cookie_secure=true
    oidc_issuer_url="https://gitlab.com"
    set_xauthrequest=true
    pass_host_header=true
    pass_user_headers=true
    request_logging=true
sessionStorage:
  type: redis
redis:
  enabled: true
  image:
    repository: arm64v8/redis
    tag: 6.0.19
  replica:
    replicaCount: 0
image:
  tag: v7.4.0-arm64

livenessProbe:
  enabled: false

readinessProbe:
  enabled: false
