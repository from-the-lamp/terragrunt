apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: {{ .Values.defaultGateway.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    istio: {{ .Values.defaultLB.istioSelector }} 
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: "{{ .Values.defaultLB.istioSelector }}-tls"
    {{- with .Values.defaultGateway.hosts }}
    hosts:
      {{- toYaml . | nindent 6 }}
    {{- end }}
