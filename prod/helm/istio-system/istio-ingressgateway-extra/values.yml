defaultGateway:
  name: https
  hosts:
  - "from-the-lamp.com"
  - "*.from-the-lamp.com"
defaultLB:
  istioSelector: ingressgateway

internalLB:
  enabled: true
  name: istio-internal
  istioLabel: internal
  replicas: 1
  ports:
  - name: status-port
    port: 15020
    protocol: TCP
    targetPort: 15020
  - name: http2
    port: 80
    protocol: TCP
    targetPort: 80
  - name: https
    port: 443
    protocol: TCP
    targetPort: 443
  - name: smpp
    port: 2775
    protocol: TCP
    targetPort: 2775
  - name: tcp
    port: 31400
    protocol: TCP
    targetPort: 31400
  - name: https-kiali
    port: 15029
    protocol: TCP
    targetPort: 15029
  - name: https-prometheus
    port: 15030
    protocol: TCP
    targetPort: 15030
  - name: https-grafana
    port: 15031
    protocol: TCP
    targetPort: 15031
  - name: tls
    port: 15443
    protocol: TCP
    targetPort: 15443
