version: "3"

dotenv: [".env"]
vars:
  DOCKER_CI_CD_IMAGE: registry.gitlab.com/infra154/docker-images/cicd:latest
env:
  OCI_REGION: eu-frankfurt-1
  ANSIBLE_HOST_KEY_CHECKING: False
  TERRAGRUNT_AUTO_INIT: true

silent: true
tasks:
  plan:all:
    dir: prod
    cmds:
      - task: rm
      - terragrunt run-all plan

  apply:all:
    dir: prod
    cmds:
      - task: rm
      - terragrunt run-all apply -auto-approve

  destroy:all:
    dir: prod
    cmds:
      - task: rm
      - terragrunt run-all destroy -auto-approve

  rm:
    cmds:
      - find . -iname ".terraform.lock.hcl" -prune -exec rm -rf {} \;
      - find . -type d -name ".terragrunt-cache" -prune -exec rm -rf {} \;
      - find . -iname ".terraform" -prune -exec rm -rf {} \;

  availability:
    cmds:
      - oci iam availability-domain list --compartment-id $TF_VAR_compartment_ocid  
