version: "3"

dotenv: [".env"]
vars:
  DOCKER_CI_CD_IMAGE: registry.gitlab.com/infra154/docker-images/cicd:latest

silent: true
tasks:
  oci:
    cmds:
      - docker pull {{ .DOCKER_CI_CD_IMAGE }}
      - >
        docker run -it --rm  \
                    -v /home/$(whoami)/.ssh/id_rsa:/root/.ssh/id_rsa \
                    -v /home/$(whoami)/.ssh/id_rsa.pub:/root/.ssh/id_rsa.pub \
                    -v $(pwd)/config:/root/.oci/config \
                    -v $(pwd)/.env:/workdir/.env \
                    -v $(pwd)/Taskfile.yml:/workdir/Taskfile.yml {{ .DOCKER_CI_CD_IMAGE }} task bash

  bash:
    cmds:
      - bash

  plan:platform:
    dir: prod/platform
    cmds:
      - terraform plan

  plan:resources:
    dir: prod/resources
    cmds:
      - terraform plan

  apply:platform:
    dir: prod/platform
    cmds:
      - terraform apply -auto-aprove

  apply:resources:
    dir: prod/resources
    cmds:
      - terraform apply -auto-aprove
      