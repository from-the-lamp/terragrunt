version: "3"

dotenv: [".env"]
vars:
  LOG_LEVEL: info

includes:
  custom: 
    taskfile: .tasks/custom.yml
    flatten: true
    optional: true
  terragrunt:
    taskfile: .tasks/terragrunt.yml
    flatten: true

silent: true
tasks:

  default:
    desc: List all available tasks
    cmd: task --list-all

  cleanup:
    desc: Remove temporary files
    cmds:
    - find . -type d -name ".terragrunt-cache" -prune -exec rm -rf {} \;
    - find . -type d -name ".terraform" -prune -exec rm -rf {} \;
    - find . -iname "*generated*" -delete;
    - find . -iname ".helmignore" -delete;
    - find . -iname ".terraform.lock.hcl" -delete;
