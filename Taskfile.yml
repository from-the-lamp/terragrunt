version: "3"

dotenv: [".env"]
  
silent: true
tasks:
  rm:all:
    cmds:
    - find . -type d -name ".terragrunt-cache" -prune -exec rm -rf {} \;
    - find . -type d -name ".terraform" -prune -exec rm -rf {} \;
    - find . -iname "*generated*" -delete;
    - find . -iname ".terraform.lock.hcl" -delete;
    - find . -iname ".helmignore" -delete;

  terragrunt:
    dir: $DIR
    cmds:
    - task: rm:all
    - terragrunt run-all {{ .ACTION }} --terragrunt-non-interactive

  plan:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "plan",
      }
  apply:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "apply",
      }
  destroy:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "destroy",
      }
