version: "3"

dotenv: [".env"]
env:
  LOG_LEVEL: info
  OCI_CONFIG_PATH: "{{.HOME}}/.oci/config"
  
silent: true
tasks:
  cleanup:
    cmds:
    - find . -type d -name ".terragrunt-cache" -prune -exec rm -rf {} \;
    - find . -type d -name ".terraform" -prune -exec rm -rf {} \;
    - find . -iname "*generated*" -delete;
    - find . -iname ".helmignore" -delete;
    - find . -iname ".terraform.lock.hcl" -delete;

  terragrunt:
    dir: $DIR
    cmds:
    - |
      terragrunt run-all {{ .ACTION }} \
        -compact-warnings --non-interactive  \
        --log-level {{.LOG_LEVEL}} \
        {{.CLI_ARGS}} {{ .ADDITION_ARGS }}

  plan:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "plan",
      }
  apply:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "apply",
      }
  destroy:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "destroy",
      }
  validate:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "validate",
      }
  migrate-state:
    dir: $DIR
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "init",
        ADDITION_ARGS: "-migrate-state -input=true"
      }
  output:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "output",
      }
  outputs:
    cmds:
    - task: output

  unlock:
    dir: $DIR
    cmds:
    - terragrunt force-unlock {{.CLI_ARGS}}

  fmt:
    cmds:
    - terragrunt hclfmt
