version: "3"

dotenv: [".env"]
env:
  OCI_REGION: eu-frankfurt-1
  TERRAGRUNT_AUTO_INIT: true

silent: true
tasks:
  rm:
    dir: $DIR
    cmds:
      - find . -type d -name ".terragrunt-cache" -prune -exec rm -rf {} \;
      - find . -type d -name ".terraform" -prune -exec rm -rf {} \;
      - find . -iname "*generated*" -delete;
      - find . -iname ".terraform.lock.hcl" -delete;
      - find . -iname ".helmignore" -delete;

  rm:all:
    cmds:
      - find . -type d -name ".terragrunt-cache" -prune -exec rm -rf {} \;
      - find . -type d -name ".terraform" -prune -exec rm -rf {} \;
      - find . -iname "*generated*" -delete;
      - find . -iname ".terraform.lock.hcl" -delete;
      - find . -iname ".helmignore" -delete;

  init:all:
    dir: $DIR
    cmds:
      - terragrunt run-all init

  plan:all:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt run-all plan --terragrunt-non-interactive

  apply:all:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt run-all apply --terragrunt-non-interactive

  apply:all:force:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt run-all apply --terragrunt-non-interactive

  destroy:all:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt run-all destroy

  plan:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt plan

  plan:force:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt plan --terragrunt-non-interactive

  apply:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt apply

  apply:force:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt apply  -auto-approve --terragrunt-non-interactive

  destroy:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt destroy

  destroy:force:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt destroy -auto-approve --terragrunt-non-interactive

  unlock:
    dir: $DIR
    cmds:
      - task: rm
      - terragrunt force-unlock $ID