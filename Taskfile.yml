version: "3"

dotenv: [".env"]
env:
  OCI_CONFIG_PATH: "{{.HOME}}/.oci/config"

silent: true
tasks:
  rm:all:
    cmds:
    - find . -type d -name ".terragrunt-cache" -prune -exec rm -rf {} \;
    - find . -type d -name ".terraform" -prune -exec rm -rf {} \;
    - find . -iname "*generated*" -delete;
    - find . -iname ".terraform.lock.hcl" -delete;
    - find . -iname ".helmignore" -delete;

  terragrunt:
    dir: $DIR
    cmds:
    - terragrunt run-all {{ .ACTION }} --terragrunt-non-interactive {{ .CLI_ARGS }}

  plan:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "plan",
      }
  apply:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "apply",
      }
  destroy:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "destroy",
      }
  validate:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "validate",
      }
  output:
    cmds:
    - task: terragrunt
      vars: {
        ACTION: "output",
      }

  teleport:login:
    cmds:
    - tsh login --proxy=tp.from-the-lamp.work:443 --user=admin --auth local 
  teleport:admin:
    cmds:
    - |
      kubectl -n teleport exec -i deployment/teleport-cluster-auth -- tctl create -f - <<EOF
        kind: role
        version: v6
        metadata:
          name: member
        spec:
          allow:
            kubernetes_groups: ["system:masters"]
            kubernetes_labels:
              '*': '*'
            kubernetes_resources:
              - kind: 'pod'
                namespace: '*'
                name: '*'
      EOF
    - kubectl -n teleport exec -ti deployment/teleport-cluster-auth -- tctl users add admin --roles=member || true
    - kubectl -n teleport exec -ti deployment/teleport-cluster-auth -- tctl users reset admin
  teleport:terraform:
    cmds:
    - |
      kubectl -n teleport exec -i deployment/teleport-cluster-auth -- tctl create -f - <<EOF
      kind: role
      version: v7
      metadata:
        name: terraform
      spec:
        allow:
          db_labels:
            '*': '*'
          app_labels:
            '*': '*'
          rules:
            - resources:
              - app
              - cluster_auth_preference
              - cluster_networking_config
              - db
              - device
              - github
              - login_rule
              - oidc
              - okta_import_rule
              - role
              - saml
              - session_recording_config
              - token
              - trusted_cluster
              - user
              verbs: ['list','create','read','update','delete']
      EOF
    - |
      kubectl -n teleport exec -i deployment/teleport-cluster-auth -- tctl create -f - <<EOF
      kind: user
      version: v2
      metadata:
        name: terraform
      spec:
        roles: ['terraform']
      EOF
    - |
      kubectl -n teleport exec -i deployment/teleport-cluster-auth -- tctl create -f - <<EOF
      kind: role
      version: v7
      metadata:
        name: terraform-impersonator
      spec:
        allow:
          impersonate:
            users: ['terraform']
            roles: ['terraform']
      EOF
  