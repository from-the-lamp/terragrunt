applicationsets:

  platform-infra:
    namespace: argocd
    goTemplate: true
    generators:
      - git:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          revision: HEAD
          directories:
            - path: 'infra/platform/*'
    ignoreApplicationDifferences:
      - jsonPointers:
          - /spec/syncPolicy
    template:
      metadata:
        name: "infra-{{.path.basename}}"
        annotations:
          notifications.argoproj.io/subscribe.on-sync-succeeded.slack: argocd-platform
      spec:
        project: platform-infra
        source:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          targetRevision: HEAD
          path: "{{.path.path}}"
          helm:
            releaseName: "{{.path.basename}}"
        destination:
          name: infra
          namespace: "{{.path.basename}}"
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
          managedNamespaceMetadata:
            labels:
              kargo.akuity.io/project: "true"
            annotations:
              kargo.akuity.io/keep-namespace: "true"
        ignoreDifferences:
          - group: admissionregistration.k8s.io
            kind: ValidatingWebhookConfiguration
            jsonPointers:
              - /webhooks/0/failurePolicy
          - group: postgresql.cnpg.io
            kind: Cluster
            name: postgres
            namespace: postgres
            jqPathExpressions:
              - .spec.managed.roles[].passwordSecret.remoteSecretKey
          - group: ""
            kind: Service
            jsonPointers:
              - /spec/externalName
          - group: apiextensions.k8s.io
            kind: CustomResourceDefinition
            jsonPointers:
              - /spec/preserveUnknownFields

  product-infra:
    namespace: argocd
    goTemplate: true
    generators:
      - git:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          revision: HEAD
          directories:
            - path: 'infra/product/*'
    ignoreApplicationDifferences:
      - jsonPointers:
          - /spec/syncPolicy
    template:
      metadata:
        name: "infra-{{.path.basename}}"
        annotations:
          notifications.argoproj.io/subscribe.on-sync-succeeded.slack: argocd-product
          kargo.akuity.io/authorized-stage: "kargo-projects:infra"
      spec:
        project: product-infra
        source:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          targetRevision: HEAD
          path: "{{.path.path}}"
          helm:
            releaseName: "{{.path.basename}}"
            valueFiles:
              - values.yaml
              - .kargo.values.yaml
        destination:
          name: infra
          namespace: "product"
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
          managedNamespaceMetadata:
            labels:
              kargo.akuity.io/project: "true"
            annotations:
              kargo.akuity.io/keep-namespace: "true"

