applicationsets:
  default:
    namespace: argocd
    syncPolicy:
      preserveResourcesOnDeletion: false
    goTemplate: true
    generators:
      - git:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          revision: HEAD
          directories:
            - path: 'default/*'
    ignoreApplicationDifferences:
      - jsonPointers:
          - /spec/syncPolicy
    template:
      metadata:
        name: "infra-{{.path.basename}}"
      spec:
        project: default
        source:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          targetRevision: HEAD
          path: "{{.path.path}}"
          helm:
            releaseName: "{{.path.basename}}"
        destination:
          name: infra
          namespace: "{{.path.basename}}"
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
