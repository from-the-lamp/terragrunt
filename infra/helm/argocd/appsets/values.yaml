applicationsets:
  platform:
    namespace: argocd
    generators:
    - list:
        elements:
        - name: kube-system
        - name: argo
        - name: cloudflare
        - name: cloudtty
        - name: crossplane
        - name: gitlab
        - name: istio-system
        - name: minio
        - name: oauth2-proxy
        - name: observability
        - name: postgresql
        - name: reloader
        - name: teleport
        - name: vault
        - name: velero
        - name: external-dns
        - name: cert-manager
        - name: origin-ca-issuer
    template:
      metadata:
        name: "{{name}}"
      spec:
        project: default
        source:
          repoURL: https://gitlab.com/from-the-lamp/infra/argo-apps.git
          targetRevision: HEAD
          path: "infra/{{name}}"
        destination:
          name: in-cluster
          namespace: argocd
        syncPolicy:
          automated:
            prune: true
            selfHeal: true

  product:
    namespace: argocd
    generators:
    - list:
        elements:
        - name: backend
        - name: frontend
    template:
      metadata:
        name: "{{name}}"
      spec:
        project: default
        source:
          repoURL: https://gitlab.com/from-the-lamp/infra/argo-apps.git
          targetRevision: HEAD
          path: "{{name}}"
        destination:
          name: in-cluster
          namespace: argocd
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
