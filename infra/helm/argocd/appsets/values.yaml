applicationsets:

  platform-preprod:
    namespace: argocd
    goTemplate: true
    generators:
      - git:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          revision: HEAD
          directories:
            - path: 'preprod/platform/*'
    ignoreApplicationDifferences:
      - jsonPointers:
          - /spec/syncPolicy
    template:
      metadata:
        name: "preprod-{{.path.basename}}"
        annotations:
          notifications.argoproj.io/subscribe.on-sync-succeeded.slack: 'argocd-platform'
          argocd.argoproj.io/compare-options: ServerSideDiff=true
      spec:
        project: platform
        source:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          targetRevision: HEAD
          path: "{{.path.path}}"
          helm:
            releaseName: "{{.path.basename}}"
        destination:
          name: in-cluster
          namespace: "{{.path.basename}}"
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
