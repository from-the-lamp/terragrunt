applicationsets:

  platform-infra:
    namespace: argocd
    goTemplate: true
    generators:
      - git:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          revision: HEAD
          directories:
            - path: 'infra/platform/*'
    ignoreApplicationDifferences:
      - jsonPointers:
          - /spec/syncPolicy
    template:
      metadata:
        name: "infra-{{.path.basename}}"
        annotations:
          notifications.argoproj.io/subscribe.on-sync-succeeded.slack: 'argocd-platform'
          argocd.argoproj.io/compare-options: ServerSideDiff=true
      spec:
        project: platform-infra
        source:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          targetRevision: HEAD
          path: "{{.path.path}}"
          plugin:
            name: default-helm
            env:
              - name: HELM_ARGS
                value: "-f values.yaml"
              - name: HELM_RELEASE_NAME
                value: "{{.path.basename}}"
        destination:
          name: in-cluster
          namespace: "{{.path.basename}}"
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
        ignoreDifferences:
          - group: admissionregistration.k8s.io
            kind: ValidatingWebhookConfiguration
            jsonPointers:
              - /webhooks/0/failurePolicy

  platform-prod-0:
    namespace: argocd
    goTemplate: true
    generators:
      - git:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          revision: HEAD
          directories:
            - path: 'prod-0/platform/*'
    ignoreApplicationDifferences:
      - jsonPointers:
          - /spec/syncPolicy
    template:
      metadata:
        name: "prod-0-{{.path.basename}}"
        annotations:
          notifications.argoproj.io/subscribe.on-sync-succeeded.slack: 'argocd-platform'
          argocd.argoproj.io/compare-options: ServerSideDiff=true
      spec:
        project: platform-prod
        source:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          targetRevision: HEAD
          path: "{{.path.path}}"
          plugin:
            name: default-helm
            env:
              - name: HELM_ARGS
                value: "-f values.yaml"
              - name: HELM_RELEASE_NAME
                value: "{{.path.basename}}"
        destination:
          name: prod-0
          namespace: "{{.path.basename}}"
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
        ignoreDifferences:
          - group: admissionregistration.k8s.io
            kind: ValidatingWebhookConfiguration
            jsonPointers:
              - /webhooks/0/failurePolicy
              
  product-prod-0:
    namespace: argocd
    goTemplate: true
    generators:
      - git:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          revision: HEAD
          directories:
            - path: 'prod-0/product/*'
    ignoreApplicationDifferences:
      - jsonPointers:
          - /spec/syncPolicy
    template:
      metadata:
        name: "prod-0-{{.path.basename}}"
        annotations:
          argocd-image-updater.argoproj.io/git-branch: main
          argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
          argocd-image-updater.argoproj.io/image-list: app=registry.gitlab.com/from-the-lamp/frontend/{{.path.basename}}:latest
          argocd-image-updater.argoproj.io/app.force-update: "true"
          argocd-image-updater.argoproj.io/app.update-strategy: digest
          argocd-image-updater.argoproj.io/app.helm.image-name: global.image.name
          argocd-image-updater.argoproj.io/app.helm.image-tag: global.image.tag
          notifications.argoproj.io/subscribe.on-sync-succeeded.slack: 'argocd-product'
          argocd.argoproj.io/compare-options: ServerSideDiff=true
      spec:
        project: product-prod
        source:
          repoURL: "https://gitlab.com/from-the-lamp/infra/argo-apps.git"
          targetRevision: HEAD
          path: "{{.path.path}}"
          plugin:
            name: default-helm
            env:
              - name: HELM_ARGS
                value: "-f values.yaml"
              - name: HELM_RELEASE_NAME
                value: "{{.path.basename}}"
        destination:
          name: prod-0
          namespace: "product"
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
