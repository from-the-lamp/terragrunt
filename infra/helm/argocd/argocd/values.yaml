global:
  nodeSelector:
    node-role: worker
  domain: argocd.from-the-lamp.work
env:
  ARGOCD_K8S_CLIENT_QPS: 300
controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  args:
    appResyncPeriod: "180"
dex:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
redis:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
server:
  extensions:
    enabled: true
    extensionList:
      - name: rollout-extension
        env:
          - name: EXTENSION_URL
            value: https://github.com/argoproj-labs/rollout-extension/releases/download/v0.3.5/extension.tar
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
notifications:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  envFrom:
    - secretRef:
        name: argocd-secret
  volumes:
    - configMap:
        name: argocd-cmp-cm
      name: argocd-cmp-cm
    - name: custom-tools
      emptyDir: { }
  initContainers:
    - name: download-tools
      image: registry.access.redhat.com/ubi8
      env:
        - name: AVP_VERSION
          value: 1.18.1
      command: [ sh, -c ]
      args:
        - >-
          curl -L https://github.com/argoproj-labs/argocd-vault-plugin/releases/download/v$(AVP_VERSION)/argocd-vault-plugin_$(AVP_VERSION)_linux_arm64 -o argocd-vault-plugin &&
          chmod +x argocd-vault-plugin &&
          mv argocd-vault-plugin /custom-tools/
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
  extraContainers:
    - name: avp-helm
      image: quay.io/argoproj/argocd:v2.12.0
      command: [ /var/run/argocd/argocd-cmp-server ]
      envFrom:
        - secretRef:
            name: argocd-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      volumeMounts:
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /tmp
          name: tmp
        # Register plugins into sidecar
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: avp-helm.yaml
          name: argocd-cmp-cm
        # Important: Mount tools into $PATH
        - name: custom-tools
          subPath: argocd-vault-plugin
          mountPath: /usr/local/bin/argocd-vault-plugin
  rbac:
    - apiGroups:
        - ""
      resources:
        - secrets
      verbs:
        - get
        - list
        - watch

configs:
  cm:
    url: https://argocd.from-the-lamp.work
    admin.enabled: "false"
    exec.enabled: true
    accounts.gitlab-ci-user: apiKey
    accounts.iac: apiKey
    application.resourceTrackingMethod: annotation
    resource.exclusions: |
      - apiGroups:
        - "*"
        kinds:
        - ProviderConfigUsages
    resource.customizations: |
      "*.upbound.io/*":
        health.lua: |
          health_status = {
            status = "Progressing",
            message = "Provisioning ..."
          }

          local function contains (table, val)
            for i, v in ipairs(table) do
              if v == val then
                return true
              end
            end
            return false
          end

          local has_no_status = {
            "ProviderConfig",
            "ProviderConfigUsage"
          }

          if obj.status == nil or next(obj.status) == nil and contains(has_no_status, obj.kind) then
            health_status.status = "Healthy"
            health_status.message = "Resource is up-to-date."
            return health_status
          end

          if obj.status == nil or next(obj.status) == nil or obj.status.conditions == nil then
            if obj.kind == "ProviderConfig" and obj.status.users ~= nil then
              health_status.status = "Healthy"
              health_status.message = "Resource is in use."
              return health_status
            end
            return health_status
          end

          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "LastAsyncOperation" then
              if condition.status == "False" then
                health_status.status = "Degraded"
                health_status.message = condition.message
                return health_status
              end
            end

            if condition.type == "Synced" then
              if condition.status == "False" then
                health_status.status = "Degraded"
                health_status.message = condition.message
                return health_status
              end
            end

            if condition.type == "Ready" then
              if condition.status == "True" then
                health_status.status = "Healthy"
                health_status.message = "Resource is up-to-date."
                return health_status
              end
            end
          end

          return health_status

      "*.crossplane.io/*":
        health.lua: |
          health_status = {
            status = "Progressing",
            message = "Provisioning ..."
          }

          local function contains (table, val)
            for i, v in ipairs(table) do
              if v == val then
                return true
              end
            end
            return false
          end

          local has_no_status = {
            "Composition",
            "CompositionRevision",
            "DeploymentRuntimeConfig",
            "ControllerConfig",
            "ProviderConfig",
            "ProviderConfigUsage"
          }
          if obj.status == nil or next(obj.status) == nil and contains(has_no_status, obj.kind) then
              health_status.status = "Healthy"
              health_status.message = "Resource is up-to-date."
            return health_status
          end

          if obj.status == nil or next(obj.status) == nil or obj.status.conditions == nil then
            if obj.kind == "ProviderConfig" and obj.status.users ~= nil then
              health_status.status = "Healthy"
              health_status.message = "Resource is in use."
              return health_status
            end
            return health_status
          end

          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "LastAsyncOperation" then
              if condition.status == "False" then
                health_status.status = "Degraded"
                health_status.message = condition.message
                return health_status
              end
            end

            if condition.type == "Synced" then
              if condition.status == "False" then
                health_status.status = "Degraded"
                health_status.message = condition.message
                return health_status
              end
            end

            if contains({"Ready", "Healthy", "Offered", "Established"}, condition.type) then
              if condition.status == "True" then
                health_status.status = "Healthy"
                health_status.message = "Resource is up-to-date."
                return health_status
              end
            end
          end

          return health_status  

  secret:
    createSecret: true
    extra:
      AVP_AUTH_TYPE: k8s
      AVP_K8S_ROLE: argocd
      AVP_TYPE: vault
      VAULT_ADDR: http://vault.vault.svc.cluster.local:8200

  cmp:
    create: true
    plugins:
      avp-helm:
        allowConcurrency: true
        discover:
          find:
            command:
              - bash
              - "-c"
              - "find . -name 'Chart.yaml' && find . -name 'values.yaml'"
        init:
          command: [ "bash", "-c" ]
          args:
          - >
            helm dependency build
        generate:
          args:
            - |
              helm template ${ARGOCD_ENV_HELM_RELEASE_NAME:-$ARGOCD_APP_NAME} --namespace $ARGOCD_APP_NAMESPACE --create-namespace --include-crds $ARGOCD_ENV_HELM_ARGS . | argocd-vault-plugin generate -
          command:
            - bash
            - -c
        lockRepo: false

  params:
    server.insecure: true
    dexserver.disable.tls: true
    applicationsetcontroller.enable.progressive.syncs: true
  rbac:
    policy.default: role:readonly
    policy.csv: |
      p, role:release-admin, applications, *, */*, allow
      p, role:release-admin, clusters, get, *, allow
      p, role:release-admin, repositories, get, *, allow
      p, role:release-admin, repositories, create, *, allow
      p, role:release-admin, repositories, update, *, allow
      p, role:release-admin, repositories, delete, *, allow
      g, from-the-lamp, role:admin
      g, iac, role:admin
      g, gitlab-ci-user, role:release-admin
      g, frontend, role:release-admin
      g, backend, role:release-admin
notifications:
  secret:
    items:
      slack-token: ${get_env("SLACK_TOKEN")}
  notifiers:
    service.slack: |
      token: $slack-token
  subscriptions:
    - recipients:
      - slack:devops
      triggers:
      - on-sync-failed
      - on-sync-status-unknown
  templates: 
    template.app-created: |
      email:
        subject: Application {{.app.metadata.name}} has been created.
      message: Application {{.app.metadata.name}} has been created.
      teams:
        title: Application {{.app.metadata.name}} has been created.
    template.app-deleted: |
      email:
        subject: Application {{.app.metadata.name}} has been deleted.
      message: Application {{.app.metadata.name}} has been deleted.
      teams:
        title: Application {{.app.metadata.name}} has been deleted.
    template.app-deployed: |
      email:
        subject: New version of an application {{.app.metadata.name}} is up and running.
      message: |
        {{if eq .serviceType "slack"}}:white_check_mark:{{end}} Application {{.app.metadata.name}} is now running new version of deployments manifests.
      slack:
        attachments: |
          [{
            "title": "{{ .app.metadata.name}}",
            "title_link":"{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
            "color": "#18be52",
            "fields": [
            {
              "title": "Sync Status",
              "value": "{{.app.status.sync.status}}",
              "short": true
            },
            {
              "title": "Repository",
              "value": "{{.app.spec.source.repoURL}}",
              "short": true
            },
            {
              "title": "Revision",
              "value": "{{.app.status.sync.revision}}",
              "short": true
            }
            {{range $index, $c := .app.status.conditions}}
            ,
            {
              "title": "{{$c.type}}",
              "value": "{{$c.message}}",
              "short": true
            }
            {{end}}
            ]
          }]
        deliveryPolicy: Post
        groupingKey: ""
        notifyBroadcast: false
      teams:
        facts: |
          [{
            "name": "Sync Status",
            "value": "{{.app.status.sync.status}}"
          },
          {
            "name": "Repository",
            "value": "{{.app.spec.source.repoURL}}"
          },
          {
            "name": "Revision",
            "value": "{{.app.status.sync.revision}}"
          }
          {{range $index, $c := .app.status.conditions}}
            ,
            {
              "name": "{{$c.type}}",
              "value": "{{$c.message}}"
            }
          {{end}}
          ]
        potentialAction: |-
          [{
            "@type":"OpenUri",
            "name":"Operation Application",
            "targets":[{
              "os":"default",
              "uri":"{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
            }]
          },
          {
            "@type":"OpenUri",
            "name":"Open Repository",
            "targets":[{
              "os":"default",
              "uri":"{{.app.spec.source.repoURL | call .repo.RepoURLToHTTPS}}"
            }]
          }]
        themeColor: '#000080'
        title: New version of an application {{.app.metadata.name}} is up and running.
    template.app-health-degraded: |
      email:
        subject: Application {{.app.metadata.name}} has degraded.
      message: |
        {{if eq .serviceType "slack"}}:exclamation:{{end}} Application {{.app.metadata.name}} has degraded.
